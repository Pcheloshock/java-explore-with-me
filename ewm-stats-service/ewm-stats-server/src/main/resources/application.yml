server:
  port: 9090
  address: 0.0.0.0

spring:
  application:
    name: ewm-stats-service
  datasource:
    url: jdbc:postgresql://localhost:5432/stats
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        format_sql: true
    show-sql: true
  sql:
    init:
      mode: always

logging:
  level:
    ru.practicum: DEBUG
    org.springframework.web: INFO
