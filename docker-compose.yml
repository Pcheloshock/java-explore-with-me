services:
  stats-db:
    image: postgres:14-alpine
    container_name: stats-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    networks:
      - ewm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d stats"]
      interval: 5s
      timeout: 5s
      retries: 5

  ewm-db:
    image: postgres:14-alpine
    container_name: ewm-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ewm
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    networks:
      - ewm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ewm"]
      interval: 5s
      timeout: 5s
      retries: 5

  ewm-stats-service:
    build:
      context: ./ewm-stats-service/ewm-stats-server
      dockerfile: Dockerfile
    container_name: ewm-stats-service
    ports:
      - "9090:9090"  # Меняем с 9091 на 9090
    depends_on:
      stats-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SERVER_PORT: 9090
    networks:
      - ewm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  ewm-main-service:
    build:
      context: ./ewm-main-service
      dockerfile: Dockerfile
    container_name: ewm-main-service
    ports:
      - "8080:8080"  # Меняем с 8081 на 8080
    depends_on:
      ewm-db:
        condition: service_healthy
      ewm-stats-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ewm-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      STATS_SERVICE_URL: http://ewm-stats-service:9090
    networks:
      - ewm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

networks:
  ewm-network:
    driver: bridge
