server:
  port: 8080

spring:
  application:
    name: ewm-main-service
  datasource:
    url: jdbc:postgresql://ewm-db:5432/ewm
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        format_sql: true
    show-sql: true
  sql:
    init:
      mode: always
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss

stats-service:
  url: http://ewm-stats-service:9090

logging:
  level:
    ru.practicum: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
